name: briefly_ai
description: AI-powered news summarizer — CS-418 BSDS-01
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  fl_chart: ^0.68.0
  http: ^1.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shimmer: ^3.0.0
  intl: ^0.19.0
  flutter_riverpod: ^2.5.1
  speech_to_text: ^7.3.0
  url_launcher: ^6.3.0
  share_plus: ^13.1.0
  google_sign_in: ^6.2.1
  camera: ^0.12.0+1
  google_mlkit_text_recognition: ^0.15.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
